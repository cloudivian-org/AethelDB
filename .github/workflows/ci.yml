#
# Continuous integration: formatting, lints (warnings = errors), build, tests,
# and the optional Kubernetes-feature build. Mirrors the local discipline in
# CONTRIBUTING.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.82"] # latest stable + the declared MSRV
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Build with the kubernetes feature
        run: cargo build -p proxy --features kubernetes

  e2e:
    name: Python e2e (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Byte-compile the suite (no heavy runtime deps needed for this gate).
      # The full suite runs locally with the built binaries: see e2e-tests/README.md.
      - name: Byte-compile the suite
        run: python -m compileall e2e-tests
