<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 792" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .box   { rx: 12; filter: url(#shadow); }
      .title { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .name  { font-size: 13px; font-weight: 700; }
      .line  { font-size: 12.5px; fill: #334155; }
      .cap   { font-size: 12px; fill: #64748b; font-style: italic; }
      .edge  { font-size: 12px; fill: #475569; font-weight: 600; }
      .edgeM { font-size: 12px; fill: #b45309; font-weight: 600; }
      .flow  { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .flowM { stroke: #d97706; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrowMuted); }
      .legend{ font-size: 12px; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1080" height="792" fill="#ffffff"/>

  <!-- Heading -->
  <text x="40" y="46" font-size="27" font-weight="800" fill="#0f172a">AethelDB</text>
  <text x="40" y="72" font-size="14.5" fill="#64748b">Serverless PostgreSQL — stateless compute, decoupled log-structured storage</text>

  <!-- ============ Ingress / compute row ============ -->
  <!-- bypass arc: proxy -> compute, skipping the optional pooler -->
  <path class="flowM" d="M315,150 C 315,108 760,108 760,150"/>
  <text x="537" y="100" text-anchor="middle" class="edgeM">or direct (no pool)</text>

  <!-- Client -->
  <rect class="box" x="40" y="152" width="120" height="92" rx="12" fill="#ffffff" stroke="#334155" stroke-width="1.6"/>
  <text x="100" y="195" text-anchor="middle" class="name" fill="#0f172a">Client</text>
  <text x="100" y="215" text-anchor="middle" class="cap">psql · app · ORM</text>

  <!-- Proxy -->
  <rect class="box" x="220" y="152" width="190" height="92" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="315" y="184" text-anchor="middle" class="name" fill="#1d4ed8">aethel-proxy</text>
  <text x="315" y="204" text-anchor="middle" class="line">wake · route · TLS · SCRAM</text>
  <text x="315" y="223" text-anchor="middle" class="cap">scale-to-zero activation</text>

  <!-- PgBouncer (optional) -->
  <rect class="box" x="455" y="158" width="150" height="80" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="530" y="190" text-anchor="middle" class="name" fill="#b45309">PgBouncer</text>
  <text x="530" y="209" text-anchor="middle" class="cap">optional pooling</text>
  <text x="530" y="226" text-anchor="middle" class="cap">(transaction mode)</text>

  <!-- Compute -->
  <rect class="box" x="650" y="152" width="220" height="92" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="760" y="184" text-anchor="middle" class="name" fill="#1d4ed8">compute — PostgreSQL 16</text>
  <text x="760" y="204" text-anchor="middle" class="line">patched smgr · streams WAL</text>
  <text x="760" y="223" text-anchor="middle" class="cap">stateless · no local disk</text>

  <!-- row-A flows -->
  <path class="flow" d="M160,198 L214,198"/>
  <text x="187" y="189" text-anchor="middle" class="edge">:5432</text>
  <path class="flow" d="M410,198 L450,198"/>
  <path class="flow" d="M605,198 L645,198"/>

  <!-- ============ compute -> storage flows ============ -->
  <!-- stream WAL (right side, vertical) -->
  <path class="flow" d="M772,246 L760,430"/>
  <text x="785" y="345" class="edge">stream WAL</text>

  <!-- get_page @LSN (curve down-left into page server) -->
  <path class="flow" d="M690,246 C 600,330 560,372 505,452"/>
  <text x="556" y="306" class="edge">get_page @LSN</text>

  <!-- ============ Storage plane ============ -->
  <!-- Page server -->
  <rect class="box" x="220" y="446" width="300" height="186" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="370" y="478" text-anchor="middle" class="name" fill="#6d28d9">aethel-pageserver</text>
  <text x="240" y="504" class="line">· decode WAL · redo via Postgres</text>
  <text x="240" y="525" class="line">· reconstruct any page @ any LSN</text>
  <text x="240" y="546" class="line">· instant branching + PITR (CoW)</text>
  <text x="240" y="567" class="line">· compaction + branch-aware GC</text>
  <text x="240" y="588" class="line">· multi-tenant · durable catalog</text>
  <text x="240" y="612" class="cap">control plane: HTTP/JSON + line (token-gated)</text>

  <!-- Safekeepers -->
  <rect class="box" x="630" y="452" width="250" height="152" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.8"/>
  <text x="755" y="482" text-anchor="middle" class="name" fill="#0f766e">aethel-safekeeper &#215; N</text>
  <text x="650" y="508" class="line">· quorum-committed WAL</text>
  <text x="650" y="529" class="line">· network replication</text>
  <text x="650" y="550" class="line">· leader election (no split-brain)</text>
  <!-- three node chips -->
  <rect x="650" y="566" width="60" height="24" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.2"/>
  <rect x="722" y="566" width="60" height="24" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.2"/>
  <rect x="794" y="566" width="60" height="24" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.2"/>
  <text x="680" y="582" text-anchor="middle" class="cap">sk-1</text>
  <text x="752" y="582" text-anchor="middle" class="cap">sk-2</text>
  <text x="824" y="582" text-anchor="middle" class="cap">sk-3</text>

  <!-- page server <- safekeeper: pull committed WAL -->
  <path class="flow" d="M628,528 L524,528"/>
  <text x="576" y="518" text-anchor="middle" class="edge">pull WAL</text>

  <!-- Object store -->
  <rect class="box" x="220" y="668" width="300" height="72" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="1.6"/>
  <text x="370" y="700" text-anchor="middle" class="name" fill="#334155">S3 / MinIO — object storage</text>
  <text x="370" y="722" text-anchor="middle" class="cap">immutable, log-structured layers</text>

  <!-- page server -> S3 -->
  <path class="flow" d="M370,632 L370,666"/>
  <text x="386" y="655" class="edge">offload layers</text>

  <!-- ============ Footer legend ============ -->
  <line x1="630" y1="648" x2="870" y2="648" stroke="#e2e8f0" stroke-width="1"/>
  <text x="630" y="676" class="legend">Observability — Prometheus <tspan font-family="monospace">/metrics</tspan> on every service,</text>
  <text x="630" y="694" class="legend">a Grafana dashboard, and optional OTLP tracing.</text>

  <g transform="translate(630,712)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#eff6ff" stroke="#2563eb"/>
    <text x="18" y="10" class="legend">ingress / compute</text>
    <rect x="148" y="0" width="12" height="12" rx="3" fill="#fffbeb" stroke="#d97706" stroke-dasharray="3 2"/>
    <text x="166" y="10" class="legend">optional</text>
  </g>
  <g transform="translate(630,734)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="18" y="10" class="legend">page storage</text>
    <rect x="108" y="0" width="12" height="12" rx="3" fill="#f0fdfa" stroke="#0d9488"/>
    <text x="126" y="10" class="legend">WAL quorum</text>
    <rect x="226" y="0" width="12" height="12" rx="3" fill="#f8fafc" stroke="#475569"/>
    <text x="244" y="10" class="legend">object store</text>
  </g>
</svg>
