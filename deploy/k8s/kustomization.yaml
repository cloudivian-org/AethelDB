apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aetheldb
resources:
  - namespace.yaml
  - minio.yaml
  - safekeeper.yaml
  - pageserver.yaml
  - proxy.yaml
