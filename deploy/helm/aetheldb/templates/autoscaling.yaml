{{- if .Values.autoscaling.proxy.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "aetheldb.fullname" . }}-proxy
  labels:
    {{- include "aetheldb.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "aetheldb.fullname" . }}-proxy
  minReplicas: {{ .Values.autoscaling.proxy.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.proxy.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.proxy.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.podDisruptionBudget.safekeeper.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aetheldb.fullname" . }}-safekeeper
  labels:
    {{- include "aetheldb.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.safekeeper.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      aethel.component: safekeeper
{{- end }}
{{- if .Values.podDisruptionBudget.proxy.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aetheldb.fullname" . }}-proxy
  labels:
    {{- include "aetheldb.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.proxy.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      aethel.component: proxy
{{- end }}
