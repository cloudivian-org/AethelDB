{{- /* SPDX-License-Identifier: Apache-2.0 */ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aetheldb.fullname" . }}-pageserver
  labels:
    {{- include "aetheldb.labels" . | nindent 4 }}
    app: pageserver
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    aethel.component: pageserver
  ports:
    - { name: page, port: 6400, targetPort: 6400 }
    - { name: ingest, port: 6401, targetPort: 6401 }
    - { name: control, port: 6402, targetPort: 6402 }
    - { name: http, port: 6403, targetPort: 6403 }
    - { name: metrics, port: 9400, targetPort: 9400 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aetheldb.fullname" . }}-pageserver
  labels:
    {{- include "aetheldb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "aetheldb.fullname" . }}-pageserver
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      aethel.component: pageserver
  template:
    metadata:
      labels:
        {{- include "aetheldb.labels" . | nindent 8 }}
        app: pageserver
        aethel.component: pageserver
      {{- if .Values.metrics.annotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
      {{- end }}
    spec:
      containers:
        - name: pageserver
          image: {{ include "aetheldb.image" (dict "svc" "pageserver" "root" $) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "aethel-pageserver"
            - "--listen"
            - "0.0.0.0:6400"
            - "--ingest-listen"
            - "0.0.0.0:6401"
            - "--control-listen"
            - "0.0.0.0:6402"
            - "--http-listen"
            - "0.0.0.0:6403"
            - "--metrics-listen"
            - "0.0.0.0:9400"
            - "--safekeeper"
            - {{ printf "%s-0.%s:6500" (include "aetheldb.safekeeperSvc" .) (include "aetheldb.safekeeperSvc" .) | quote }}
            - "--object-dir"
            - "/data/objstore"
            - "--freeze-threshold"
            - {{ .Values.pageserver.freezeThreshold | quote }}
            - "--offload-tick-secs"
            - {{ .Values.pageserver.offloadTickSecs | quote }}
          {{- if or .Values.objectStore.url .Values.objectStore.allowHttp .Values.controlToken.existingSecret }}
          env:
            {{- if .Values.objectStore.url }}
            - name: SP_PS_OBJECT_STORE_URL
              value: {{ .Values.objectStore.url | quote }}
            {{- end }}
            {{- if .Values.objectStore.allowHttp }}
            - name: SP_PS_OBJECT_STORE_ALLOW_HTTP
              value: "1"
            {{- end }}
            {{- if .Values.controlToken.existingSecret }}
            - name: SP_PS_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlToken.existingSecret | quote }}
                  key: {{ .Values.controlToken.secretKey | quote }}
            {{- end }}
          {{- end }}
          {{- if or .Values.objectStore.existingSecret (eq (include "aetheldb.manageSecret" .) "true") }}
          envFrom:
            - secretRef:
                name: {{ include "aetheldb.secretName" . }}
          {{- end }}
          ports:
            - { containerPort: 6400, name: page }
            - { containerPort: 6401, name: ingest }
            - { containerPort: 6402, name: control }
            - { containerPort: 6403, name: http }
            - { containerPort: 9400, name: metrics }
          readinessProbe:
            tcpSocket: { port: 6400 }
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - { name: cache, mountPath: /data }
          resources:
            {{- toYaml .Values.pageserver.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: cache
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.pageserver.storageClass }}
        storageClassName: {{ .Values.pageserver.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.pageserver.cacheStorage | quote }}
