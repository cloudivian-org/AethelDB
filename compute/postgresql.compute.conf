#
# Compute-node configuration for AethelDB. Include this from the data
# directory's postgresql.conf (or append it) when bootstrapping a compute node.
#
# Two jobs:
#   1. Load the network storage manager so page reads come from the page server.
#   2. Configure WAL to stream out to the safekeeper quorum, and make commits
#      wait for that quorum, instead of relying on local disk durability.

# --- 1. Network storage manager (Step 3) --------------------------------------

# aethel_smgr installs the smgr_hook at postmaster start, so it must be preloaded.
shared_preload_libraries = 'aethel_smgr'

# Where to fetch 8 KiB pages from (the Step 5 page server).
aethel_smgr.pageserver_host = '127.0.0.1'
aethel_smgr.pageserver_port = 6400

# Identify this compute node's tenant/timeline (32 hex chars each). Empty in
# single-tenant local dev means the all-zero id.
#aethel_smgr.tenant_id   = '00000000000000000000000000000000'
#aethel_smgr.timeline_id = '00000000000000000000000000000000'

# --- 2. WAL streaming to the safekeepers (prep for Step 4) --------------------

# Emit enough WAL to feed physical replication to the safekeepers.
wal_level = replica

# Allow WAL senders (the safekeepers connect as physical replicas).
max_wal_senders = 10
max_replication_slots = 10

# Durability comes from the safekeeper quorum, not local fsync: a commit is not
# acknowledged to the client until a quorum of safekeepers has the WAL. The
# safekeepers register under these application_names; `ANY 2 (...)` is a 2-of-3
# quorum. (Set up in Step 4.)
synchronous_commit = on
synchronous_standby_names = 'ANY 2 (safekeeper1, safekeeper2, safekeeper3)'

# The heap never lands on local disk (aethel_smgr write path is a no-op), so local
# checkpoints are cheap; keep WAL around only long enough to stream it out.
wal_keep_size = '1GB'

# Compute nodes are stateless and ephemeral; a fast restart matters more than
# crash-recovery of local files we don't keep.
fsync = on
full_page_writes = on

# Listen for client traffic forwarded by the activation proxy.
listen_addresses = '*'
port = 5432
