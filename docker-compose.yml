#
# Local development stack: the full AethelDB data plane wired together, plus a
# MinIO object store standing in for S3.
#
#   client ──▶ proxy(:5432) ──▶ compute (launched on demand; scale-to-zero)
#                                   │ WAL ──▶ safekeeper(:6500)
#                                   ▼ get_page
#                              pageserver(:6400) ──▶ MinIO (layers)
#
# Compute is NOT an always-on service: the proxy starts/stops it on demand, so
# it is built as an image and launched at runtime. Bring the stack up with
# `make up` (down with `make down`). Each service also exposes Prometheus
# metrics; the page server exposes the control endpoints (:6402 text, :6403 HTTP).

services:
  # S3-compatible object store for the page server's immutable layer files.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    environment:
      # DEV ONLY — well-known default credentials. Replace these (and the page
      # server's S3 keys) before any non-local use. See deploy/README.md
      # "Security hardening".
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9090:9090"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: create the bucket the page server offloads layers into.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set m http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing m/aethel &&
      echo 'bucket aethel ready'
      "

  safekeeper:
    build:
      context: .
      dockerfile: deploy/Dockerfile.rust
      args:
        BIN: aethel-safekeeper
    command:
      - "aethel-safekeeper"
      - "--listen"
      - "0.0.0.0:6500"
      - "--data-dir"
      - "/data"
      - "--metrics-listen"
      - "0.0.0.0:9500"
    ports:
      - "6500:6500"
      - "9500:9500"   # /metrics
    volumes:
      - safekeeper-data:/data

  pageserver:
    build:
      context: .
      dockerfile: deploy/Dockerfile.rust
      args:
        BIN: aethel-pageserver
    command:
      - "aethel-pageserver"
      - "--listen"
      - "0.0.0.0:6400"
      - "--ingest-listen"
      - "0.0.0.0:6401"
      - "--control-listen"
      - "0.0.0.0:6402"
      - "--http-listen"
      - "0.0.0.0:6403"
      - "--metrics-listen"
      - "0.0.0.0:9400"
      - "--safekeeper"
      - "safekeeper:6500"
      - "--s3-endpoint"
      - "http://minio:9000"
      - "--s3-bucket"
      - "aethel"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      safekeeper:
        condition: service_started
    ports:
      - "6400:6400"   # page service
      - "6401:6401"   # ingest
      - "6402:6402"   # control (text)
      - "6403:6403"   # control (HTTP/JSON)
      - "9400:9400"   # /metrics
    volumes:
      - pageserver-data:/data

  proxy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.rust
      args:
        BIN: aethel-proxy
    command:
      - "aethel-proxy"
      - "--listen"
      - "0.0.0.0:5432"
      - "--metrics-listen"
      - "0.0.0.0:9432"
    # DEV ONLY — the proxy needs the host Docker socket so the CommandActivator
    # can start/stop compute containers. This grants root-equivalent control of
    # the host; never do this in production. Use the Kubernetes activator
    # instead (deploy/README.md "Security hardening", proxy-rbac.yaml).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - safekeeper
      - pageserver
    ports:
      - "5432:5432"   # PostgreSQL wire protocol
      - "9432:9432"   # /metrics

volumes:
  minio-data:
  safekeeper-data:
  pageserver-data:
